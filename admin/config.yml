backend:
  name: github
  repo: vkronpro/Vkron
  branch: main
  base_url: https://vkron.vercel.app
  auth_endpoint: api/auth

media_folder: "uploads"
public_folder: "/uploads"

site_url: https://vkron.com.br
display_url: https://vkron.com.br
logo_url: https://imagedelivery.net/E_BFh2QU2I23Jq68Dk0FXw/ab46fc2b-a630-4b05-3fcf-cfc05c6cdd00/public

locale: 'pt'

collections:
  - name: "hero"
    label: "Texto do Hero (Capa)"
    files:
      - name: "hero_text"
        label: "Hero da Home"
        file: "data/hero.json"
        fields:
          - {label: "Título Principal", name: "title", widget: "string"}
          - {label: "Subtítulo", name: "subtitle", widget: "text"}

  - name: "results"
    label: "Resultados (Números)"
    files:
      - name: "results_list"
        label: "Lista de Resultados"
        file: "data/results.json"
        fields:
          - label: "Resultados"
            name: "results"
            widget: "list"
            label_singular: "Resultado"
            summary: "{{fields.text}}"
            fields:
              - {label: "Texto", name: "text", widget: "string", hint: "Ex: +5 mil clientes atendidos"}
              - {label: "Ícone (opcional)", name: "image", widget: "image", required: false, hint: "Logo ou ícone. Se vazio, usa um ícone padrão"}

  - name: "about"
    label: "História / Sobre Nós"
    files:
      - name: "about_text"
        label: "Texto da Seção"
        file: "data/about.json"
        fields:
          - {label: "Título", name: "title", widget: "string"}
          - {label: "Parágrafo 1", name: "p1", widget: "text"}
          - {label: "Parágrafo 2", name: "p2", widget: "text"}
          - {label: "Parágrafo 3", name: "p3", widget: "text"}

  - name: "ceos"
    label: "CEOs (Fundadores)"
    files:
      - name: "ceos_list"
        label: "Lista de CEOs"
        file: "data/ceos.json"
        fields:
          - label: "CEOs"
            name: "ceos"
            widget: "list"
            label_singular: "CEO"
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - {label: "Nome", name: "name", widget: "string"}
              - {label: "Cargo", name: "role", widget: "string", default: "CEO / Co-fundador"}
              - {label: "Foto", name: "photo", widget: "image", hint: "Cole uma URL ou envie uma imagem"}

  - name: "team"
    label: "Equipe"
    label_singular: "Membro"
    files:
      - name: "team_members"
        label: "Membros da Equipe"
        file: "data/team.json"
        fields:
          - label: "Equipe"
            name: "members"
            widget: "list"
            label_singular: "Membro"
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - {label: "Nome Completo", name: "name", widget: "string"}
              - {label: "Cargo", name: "role", widget: "string"}
              - {label: "Foto (URL ou upload)", name: "photo", widget: "image", hint: "Cole uma URL ou envie uma imagem"}

  - name: "reviews"
    label: "Avaliações Google"
    files:
      - name: "reviews_list"
        label: "Lista de Avaliações"
        file: "data/reviews.json"
        fields:
          - label: "Avaliações"
            name: "reviews"
            widget: "list"
            label_singular: "Avaliação"
            summary: "{{fields.name}}"
            fields:
              - {label: "Nome do Cliente", name: "name", widget: "string"}
              - {label: "Texto da Avaliação", name: "text", widget: "text"}
              - {label: "Data (opcional)", name: "date", widget: "string", required: false, hint: "Ex: há 3 semanas"}

  - name: "testimonials"
    label: "Depoimentos em Vídeo"
    files:
      - name: "testimonials_list"
        label: "Lista de Depoimentos"
        file: "data/testimonials.json"
        fields:
          - label: "Depoimentos"
            name: "videos"
            widget: "list"
            label_singular: "Depoimento"
            summary: "{{fields.name}} — {{fields.demand}}"
            fields:
              - {label: "Nome", name: "name", widget: "string"}
              - {label: "Demanda", name: "demand", widget: "string"}
              - {label: "Link do YouTube", name: "youtube", widget: "string", hint: "Cole a URL completa (ex: https://www.youtube.com/watch?v=ABC123 ou https://youtu.be/ABC123)"}

  - name: "partners"
    label: "Parceiros (Logos)"
    files:
      - name: "partners_list"
        label: "Lista de Parceiros"
        file: "data/partners.json"
        fields:
          - label: "Parceiros"
            name: "partners"
            widget: "list"
            label_singular: "Parceiro"
            summary: "{{fields.alt}}"
            fields:
              - {label: "Logo", name: "image", widget: "image", hint: "Cole uma URL ou envie uma imagem"}
              - {label: "Nome (alt)", name: "alt", widget: "string", hint: "Texto alternativo do logo"}

  - name: "posts"
    label: "Posts do Blog"
    label_singular: "Post"
    folder: "blog"
    create: true
    slug: "{{slug}}"
    extension: "html"
    format: "frontmatter"
    identifier_field: "title"
    summary: "{{filename}}"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Descrição (SEO)", name: "description", widget: "text"}
      - {label: "Palavras-chave", name: "keywords", widget: "string", required: false}
      - {label: "Data de Publicação", name: "date", widget: "datetime", format: "DD/MM/YYYY"}
      - {label: "Tempo de Leitura (min)", name: "readtime", widget: "number", default: 5, min: 1}
      - {label: "Imagem de Capa", name: "image", widget: "image"}
      - {label: "Texto Alternativo da Imagem", name: "image_alt", widget: "string"}
      - {label: "Conteúdo do Artigo", name: "body", widget: "markdown"}
      - {label: "CTA - Título", name: "cta_title", widget: "string", default: "Quer saber mais?"}
      - {label: "CTA - Texto", name: "cta_text", widget: "text", default: "A VKRON cria estratégias personalizadas em marketing digital para o seu negócio."}
      - {label: "CTA - Botão", name: "cta_button", widget: "string", default: "Fale com a VKRON"}

  - name: "config"
    label: "Configurações do Site"
    files:
      - name: "info"
        label: "Informações Gerais"
        file: "data/info.json"
        fields:
          - {label: "Nome da Empresa", name: "nome", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "WhatsApp", name: "whatsapp", widget: "string", hint: "Formato: (13) 99730-0529"}
          - {label: "Endereço", name: "endereco", widget: "string"}
          - {label: "Instagram (URL)", name: "instagram", widget: "string", required: false, hint: "Ex: https://www.instagram.com/vkronoficial/"}
          - {label: "TikTok (URL)", name: "tiktok", widget: "string", required: false, hint: "Ex: https://www.tiktok.com/@vkronoficial"}
          - {label: "YouTube (URL)", name: "youtube", widget: "string", required: false}
          - {label: "LinkedIn (URL)", name: "linkedin", widget: "string", required: false}
