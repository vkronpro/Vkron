<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Vkron</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url">
    <style>
        header[class*="AppHeader"] {
            background-color: #064b9c !important;
            position: relative;
        }
        header[class*="AppHeader"]::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 56px;
            background: url('https://imagedelivery.net/E_BFh2QU2I23Jq68Dk0FXw/fcec3fb6-cf4e-495a-bd88-1a7c12a46700/public') center/contain no-repeat;
            filter: brightness(0) invert(1);
            pointer-events: none;
            z-index: 1;
        }
        header[class*="AppHeader"] a,
        header[class*="AppHeader"] a *,
        header[class*="AppHeader"] span,
        header[class*="AppHeader"] svg {
            color: white !important;
            fill: white !important;
            opacity: 1 !important;
        }
        header[class*="AppHeader"] [class*="Dropdown"] a,
        header[class*="AppHeader"] [class*="Dropdown"] span,
        header[class*="AppHeader"] [class*="Menu"] a,
        header[class*="AppHeader"] [class*="Menu"] span,
        header[class*="AppHeader"] [role="menu"] *,
        header[class*="AppHeader"] [role="menuitem"] {
            color: #333 !important;
        }
    </style>
</head>
<body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
        CMS.registerPreviewStyle('/admin/preview.css');

        CMS.registerPreviewTemplate('info', createClass({
            render: function () {
                var d = this.props.entry.getIn(['data']).toJS();
                var rows = [
                    ['Nome da Empresa', d.nome],
                    ['Email', d.email],
                    ['WhatsApp', d.whatsapp],
                    ['Endereço', d.endereco],
                    ['Instagram', d.instagram],
                    ['TikTok', d.tiktok],
                    ['YouTube', d.youtube],
                    ['LinkedIn', d.linkedin]
                ];
                return h('div', {},
                    rows.map(function (r, i) {
                        return h('p', { key: i, style: { margin: '0.5rem 0' } },
                            h('strong', {}, r[0] + ': '),
                            r[1] || '—'
                        );
                    })
                );
            }
        }));

        const VKRON_BLUE = '#064b9c';
        const VKRON_GREEN = '#3aaa34';

        const normalize = (s) => (s || '').trim().toLowerCase()
            .normalize('NFD').replace(/[\u0300-\u036f]/g, '');

        const customizeUI = () => {
            document.querySelectorAll('button').forEach(btn => {
                const text = normalize(btn.textContent);
                if (text.includes('adicao') && text.includes('rapida') || text.includes('quick add')) {
                    let target = btn;
                    let node = btn;
                    for (let i = 0; i < 4; i++) {
                        if (!node.parentElement || node.parentElement === document.body) break;
                        const parent = node.parentElement;
                        const cls = String(parent.className || '');
                        if (/dropdown|quickadd/i.test(cls)) {
                            target = parent;
                            break;
                        }
                        node = parent;
                    }
                    target.style.cssText = 'display: none !important; visibility: hidden !important;';
                    target.hidden = true;
                }
            });

            document.querySelectorAll('button, a').forEach(el => {
                const text = normalize(el.textContent);
                if (text.startsWith('novo(a)') || text.startsWith('new ')) {
                    el.style.setProperty('background-color', VKRON_BLUE, 'important');
                    el.style.setProperty('border-color', VKRON_BLUE, 'important');
                    el.style.setProperty('color', 'white', 'important');
                } else if (text === 'publicar' || text === 'publish' || text.startsWith('publicar agora') || text.startsWith('publish now')) {
                    el.style.setProperty('background-color', VKRON_GREEN, 'important');
                    el.style.setProperty('border-color', VKRON_GREEN, 'important');
                    el.style.setProperty('color', 'white', 'important');
                }
            });
        };
        new MutationObserver(customizeUI).observe(document.body, { childList: true, subtree: true });
        setInterval(customizeUI, 500);
    </script>
</body>
</html>
